# AIX LPAR Deployment Profiles
# This file contains LPAR configurations for automated deployment via HMC

hmc_config:
  hostname: "hmc.example.com"
  username: "hscroot"
  port: 22
  timeout: 300

managed_systems:
  - name: "server1"
    frame: "POWER9-FRAME-01"
    hmc_hostname: "hmc.example.com"
    
  - name: "server2" 
    frame: "POWER9-FRAME-02"
    hmc_hostname: "hmc.example.com"

lpar_profiles:
  # Development LPAR Profile
  dev_lpar:
    name: "AIX-DEV-01"
    managed_system: "server1"
    profile_name: "default"
    partition_id: 10
    processor_mode: "shared"
    min_proc_units: 0.5
    desired_proc_units: 1.0
    max_proc_units: 2.0
    min_procs: 1
    desired_procs: 2
    max_procs: 4
    min_mem: 2048
    desired_mem: 4096
    max_mem: 8192
    virtual_adapters:
      - slot_id: 2
        adapter_type: "sea"
        port_vlan_id: 10
        default_vlan_id: 10
      - slot_id: 3
        adapter_type: "sea"
        port_vlan_id: 20
        default_vlan_id: 20
    storage:
      - vios_name: "vios1"
        vg_name: "rootvg"
        lv_name: "hdisk0"
        size: "50G"
    network:
      - vlan_id: 10
        ip_address: "192.168.1.100"
        netmask: "255.255.255.0"
        gateway: "192.168.1.1"
    os_settings:
      os_type: "aix"
      os_version: "7.2"
      boot_mode: "norm"

  # Production LPAR Profile
  prod_lpar:
    name: "AIX-PROD-01"
    managed_system: "server1"
    profile_name: "default"
    partition_id: 11
    processor_mode: "shared"
    min_proc_units: 1.0
    desired_proc_units: 2.0
    max_proc_units: 4.0
    min_procs: 2
    desired_procs: 4
    max_procs: 8
    min_mem: 4096
    desired_mem: 8192
    max_mem: 16384
    virtual_adapters:
      - slot_id: 2
        adapter_type: "sea"
        port_vlan_id: 30
        default_vlan_id: 30
      - slot_id: 3
        adapter_type: "sea"
        port_vlan_id: 40
        default_vlan_id: 40
    storage:
      - vios_name: "vios1"
        vg_name: "datavg"
        lv_name: "hdisk1"
        size: "100G"
    network:
      - vlan_id: 30
        ip_address: "10.0.1.100"
        netmask: "255.255.255.0"
        gateway: "10.0.1.1"
    os_settings:
      os_type: "aix"
      os_version: "7.2"
      boot_mode: "norm"

  # Test LPAR Profile
  test_lpar:
    name: "AIX-TEST-01"
    managed_system: "server2"
    profile_name: "default"
    partition_id: 20
    processor_mode: "shared"
    min_proc_units: 0.25
    desired_proc_units: 0.5
    max_proc_units: 1.0
    min_procs: 1
    desired_procs: 1
    max_procs: 2
    min_mem: 1024
    desired_mem: 2048
    max_mem: 4096
    virtual_adapters:
      - slot_id: 2
        adapter_type: "sea"
        port_vlan_id: 50
        default_vlan_id: 50
    storage:
      - vios_name: "vios1"
        vg_name: "testvg"
        lv_name: "hdisk0"
        size: "25G"
    network:
      - vlan_id: 50
        ip_address: "172.16.1.100"
        netmask: "255.255.255.0"
        gateway: "172.16.1.1"
    os_settings:
      os_type: "aix"
      os_version: "7.2"
      boot_mode: "norm"

# Deployment templates for different environments
deployment_templates:
  development:
    - profile: "dev_lpar"
      count: 2
      naming_pattern: "AIX-DEV-{index:02d}"
      
  production:
    - profile: "prod_lpar"
      count: 1
      naming_pattern: "AIX-PROD-{index:02d}"
      
  testing:
    - profile: "test_lpar"
      count: 3
      naming_pattern: "AIX-TEST-{index:02d}" 