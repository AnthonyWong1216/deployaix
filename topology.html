<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowerVM Virtualization Topology</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- vis.js Network (Standalone) -->
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <style>
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
    }
    /* vis.js canvas container */
    .topo-canvas {
      width: 100%;
      height: 100%;
      background:
        linear-gradient(90deg, rgba(148,163,184,0.06) 1px, transparent 1px) 0 0 / 40px 40px,
        linear-gradient(0deg, rgba(148,163,184,0.06) 1px, transparent 1px) 0 0 / 40px 40px,
        #ffffff;
      border-radius: 0.75rem;
    }
    .tab-btn { transition: all .15s ease; }
    .tab-btn.active {
      background: #0f172a;
      color: #fff;
      box-shadow: 0 4px 12px rgba(15,23,42,0.25);
    }
    .tab-btn:not(.active):hover { background: #e2e8f0; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 4px; display: inline-block; }
    /* prevent canvas collapse during hidden tabs */
    .tab-pane { display: none; }
    .tab-pane.active { display: flex; }
    .vis-tooltip {
      position: absolute;
      background: #0f172a;
      color: #f8fafc;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
      border: 1px solid #334155;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      white-space: pre;
      pointer-events: none;
      z-index: 50;
    }
  </style>
</head>
<body class="text-slate-800">

  <div class="max-w-[1500px] mx-auto p-4 md:p-6 flex flex-col gap-5 h-screen">

    <!-- ═══════════════ HEADER ═══════════════ -->
    <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-xl bg-slate-900 text-white grid place-items-center shadow-lg">
          <i data-lucide="network" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-xl font-bold text-slate-900 leading-tight">PowerVM Virtualization Topology</h1>
          <p class="text-sm text-slate-500">NPIV · vSCSI · Virtual Network visualizer</p>
        </div>
      </div>

      <!-- Managed System selector -->
      <div class="flex items-center gap-2">
        <label for="ms-selector" class="text-sm font-medium text-slate-600 flex items-center gap-1.5">
          <i data-lucide="server" class="w-4 h-4"></i> Managed System
        </label>
        <select id="ms-selector"
          class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-slate-400 min-w-[220px]">
          <option value="Server-9080-HEX-SN78ABCDE">Server-9080-HEX-SN78ABCDE</option>
          <option value="Server-9040-MR9-SN10FGHIJ">Server-9040-MR9-SN10FGHIJ</option>
        </select>
      </div>
    </header>

    <!-- ═══════════════ TAB NAV ═══════════════ -->
    <nav class="flex flex-wrap gap-2 bg-white p-1.5 rounded-xl shadow-sm border border-slate-200 w-fit">
      <button data-tab="npiv" class="tab-btn active flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-slate-600">
        <i data-lucide="fibre-channel" class="w-4 h-4"></i>
        <span>Virtual Fibre Channel (NPIV)</span>
      </button>
      <button data-tab="vscsi" class="tab-btn flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-slate-600">
        <i data-lucide="hard-drive" class="w-4 h-4"></i>
        <span>vSCSI Topology</span>
      </button>
      <button data-tab="vnet" class="tab-btn flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold text-slate-600">
        <i data-lucide="ethernet-port" class="w-4 h-4"></i>
        <span>Virtual Network (SEA/SR-IOV)</span>
      </button>
    </nav>

    <!-- ═══════════════ TOPOLOGY AREA ═══════════════ -->
    <section class="flex-1 min-h-0 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

      <!-- toolbar / legend -->
      <div class="flex flex-wrap items-center justify-between gap-3 px-5 py-3 border-b border-slate-200 bg-slate-50/60">
        <div id="flow-label" class="flex items-center gap-2 text-sm font-medium text-slate-500"></div>
        <div class="flex items-center gap-4">
          <div id="legend" class="flex flex-wrap items-center gap-4 text-xs text-slate-600"></div>
          <button id="reset-btn"
            class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white border border-slate-300 text-sm font-medium text-slate-600 hover:bg-slate-100 shadow-sm">
            <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> Reset view
          </button>
        </div>
      </div>

      <!-- panes -->
      <div class="flex-1 min-h-0 p-4">
        <div id="pane-npiv"  class="tab-pane active h-full w-full"><div id="net-npiv"  class="topo-canvas"></div></div>
        <div id="pane-vscsi" class="tab-pane h-full w-full"><div id="net-vscsi" class="topo-canvas"></div></div>
        <div id="pane-vnet"  class="tab-pane h-full w-full"><div id="net-vnet"  class="topo-canvas"></div></div>
      </div>

      <!-- status bar -->
      <div class="px-5 py-2.5 border-t border-slate-200 bg-slate-50/60 flex items-center gap-2 text-xs text-slate-500">
        <i data-lucide="mouse-pointer-click" class="w-3.5 h-3.5"></i>
        <span id="status-bar">Click any node to isolate its virtualization path. Click empty space to reset.</span>
      </div>
    </section>
  </div>

  <script>
  /* ============================================================
     PowerVM Virtualization Topology
     - Standalone single-file app (Tailwind + Lucide + vis.js)
     - Mock datasets simulate parsed HMC `lshwres` / `lssyscfg` output
  ============================================================ */

  // ---------- Palette (color-coded blocks) ----------
  const C = {
    vios:   { bg: '#dbeafe', border: '#2563eb', font: '#1e3a8a' }, // Blue  = VIOS
    client: { bg: '#dcfce7', border: '#16a34a', font: '#14532d' }, // Green = Client LPAR
    mid:    { bg: '#f1f5f9', border: '#94a3b8', font: '#334155' }, // Slate = intermediate
    vlan:   { bg: '#fef9c3', border: '#ca8a04', font: '#713f12' }, // Amber = VLAN/switch
    phys:   { bg: '#ede9fe', border: '#7c3aed', font: '#4c1d95' }, // Violet = physical endpoint
  };

  // Column x-coordinates for the grid-aligned 3-column flow
  const COL = { left: -460, mid: 0, right: 460 };
  const ROW_GAP = 130;

  // Helper: vertically distribute n rows centered on 0
  function rows(n, gap = ROW_GAP) {
    const start = -((n - 1) * gap) / 2;
    return Array.from({ length: n }, (_, i) => start + i * gap);
  }

  // Helper: build a styled box node
  function box(id, label, kind, x, y, title) {
    const c = C[kind];
    return {
      id, label, x, y,
      title: title || undefined,
      shape: 'box',
      color: { background: c.bg, border: c.border,
               highlight: { background: c.bg, border: c.border } },
      font: { color: c.font, size: 13, face: 'Inter, sans-serif', multi: 'html', align: 'center' },
      borderWidth: 2,
      shapeProperties: { borderRadius: 8 },
      margin: 12,
      widthConstraint: { minimum: 150, maximum: 210 },
      _kind: kind,
    };
  }

  // Helper: labeled edge
  function edge(from, to, label, title) {
    return {
      from, to, label, title: title || undefined,
      arrows: { to: { enabled: true, scaleFactor: 0.6 } },
      color: { color: '#94a3b8', highlight: '#0f172a' },
      font: { size: 11, color: '#475569', strokeWidth: 4, strokeColor: '#ffffff', align: 'middle' },
      smooth: { enabled: true, type: 'cubicBezier', roundness: 0.4 },
      width: 1.5,
    };
  }

  /* ============================================================
     MOCK DATASETS  (keyed by Managed System)
     Each dataset: { nodes: [...], edges: [...] }
  ============================================================ */
  const DATA = buildData();

  function buildData() {
    return {
      'Server-9080-HEX-SN78ABCDE': {
        npiv:  npivData_A(),
        vscsi: vscsiData_A(),
        vnet:  vnetData_A(),
      },
      'Server-9040-MR9-SN10FGHIJ': {
        npiv:  npivData_B(),
        vscsi: vscsiData_B(),
        vnet:  vnetData_B(),
      },
    };
  }

  /* ============================================================
     TAB 1 — Virtual Fibre Channel (NPIV)
     Flow:  VIOS  →  vfchost + backing fcs + phys loc  →  Client LPAR
     Edges: Client Slot IDs + active WWPNs
  ============================================================ */
  function npivData_A() {
    const nodes = [], edges = [];
    // Left: 2 VIOS
    const vy = rows(2, 200);
    nodes.push(box('v1', '<b>VIOS1</b>\nID 1 · vios1a', 'vios', COL.left, vy[0],
      'Partition: vios1a\nLPAR ID: 1\nState: Running\nRMC: active'));
    nodes.push(box('v2', '<b>VIOS2</b>\nID 2 · vios2a', 'vios', COL.left, vy[1],
      'Partition: vios2a\nLPAR ID: 2\nState: Running\nRMC: active'));

    // Middle: vfchost mappings (each backed by a physical fcs port + location)
    const midDefs = [
      { id: 'm1', v: 'v1', vfc: 'vfchost0', fcs: 'fcs0', loc: 'U78D5.001.ABC-P1-C2-T1', c: 'c1', slot: 'C3', wwpns: 'c0507609a1b20030' },
      { id: 'm2', v: 'v2', vfc: 'vfchost0', fcs: 'fcs0', loc: 'U78D5.001.DEF-P1-C5-T1', c: 'c1', slot: 'C4', wwpns: 'c0507609a1b20032' },
      { id: 'm3', v: 'v1', vfc: 'vfchost1', fcs: 'fcs1', loc: 'U78D5.001.ABC-P1-C2-T2', c: 'c2', slot: 'C3', wwpns: 'c0507609a1b20040' },
      { id: 'm4', v: 'v2', vfc: 'vfchost1', fcs: 'fcs1', loc: 'U78D5.001.DEF-P1-C5-T2', c: 'c2', slot: 'C4', wwpns: 'c0507609a1b20042' },
      { id: 'm5', v: 'v1', vfc: 'vfchost2', fcs: 'fcs2', loc: 'U78D5.001.ABC-P1-C3-T1', c: 'c3', slot: 'C3', wwpns: 'c0507609a1b20050' },
    ];
    const my = rows(midDefs.length, 118);
    midDefs.forEach((m, i) => {
      nodes.push(box(m.id,
        `<b>${m.vfc}</b>\n${m.fcs} · fabric\n<i>${m.loc}</i>`,
        'mid', COL.mid, my[i],
        `Virtual FC Host: ${m.vfc}\nBacking port: ${m.fcs}\nPhysical loc: ${m.loc}\nFabric login: LOGGED_IN`));
      edges.push(edge(m.v, m.id, '', `${m.vfc} hosted on VIOS`));
      edges.push(edge(m.id, m.c,
        `Slot ${m.slot}\nWWPN ${m.wwpns}`,
        `Client vFC slot: ${m.slot}\nActive WWPN: ${m.wwpns}\nNPIV: enabled`));
    });

    // Right: client LPARs
    const cDefs = [
      { id: 'c1', n: 'aix-db-prod',  lid: 11 },
      { id: 'c2', n: 'aix-app-prod', lid: 12 },
      { id: 'c3', n: 'linux-web01',  lid: 13 },
    ];
    const cy = rows(cDefs.length, 170);
    cDefs.forEach((c, i) => {
      nodes.push(box(c.id, `<b>${c.n}</b>\nLPAR ID ${c.lid}`, 'client', COL.right, cy[i],
        `Client LPAR: ${c.n}\nLPAR ID: ${c.lid}\nOS: AIX / Linux\nBoot: SAN (NPIV)`));
    });
    return { nodes, edges };
  }

  function npivData_B() {
    const nodes = [], edges = [];
    const vy = rows(2, 180);
    nodes.push(box('v1', '<b>VIOS1</b>\nID 1 · vio1', 'vios', COL.left, vy[0], 'Partition: vio1\nLPAR ID: 1\nState: Running'));
    nodes.push(box('v2', '<b>VIOS2</b>\nID 2 · vio2', 'vios', COL.left, vy[1], 'Partition: vio2\nLPAR ID: 2\nState: Running'));

    const midDefs = [
      { id: 'm1', v: 'v1', vfc: 'vfchost0', fcs: 'fcs0', loc: 'U78CB.001.XYZ-P1-C1-T1', c: 'c1', slot: 'C2', wwpns: 'c0507601aa990010' },
      { id: 'm2', v: 'v2', vfc: 'vfchost0', fcs: 'fcs0', loc: 'U78CB.001.WWW-P1-C1-T1', c: 'c1', slot: 'C5', wwpns: 'c0507601aa990012' },
      { id: 'm3', v: 'v1', vfc: 'vfchost1', fcs: 'fcs1', loc: 'U78CB.001.XYZ-P1-C1-T2', c: 'c2', slot: 'C2', wwpns: 'c0507601aa990020' },
    ];
    const my = rows(midDefs.length, 140);
    midDefs.forEach((m, i) => {
      nodes.push(box(m.id, `<b>${m.vfc}</b>\n${m.fcs} · fabric\n<i>${m.loc}</i>`, 'mid', COL.mid, my[i],
        `Virtual FC Host: ${m.vfc}\nBacking port: ${m.fcs}\nPhysical loc: ${m.loc}`));
      edges.push(edge(m.v, m.id, ''));
      edges.push(edge(m.id, m.c, `Slot ${m.slot}\nWWPN ${m.wwpns}`,
        `Client vFC slot: ${m.slot}\nActive WWPN: ${m.wwpns}`));
    });

    const cDefs = [
      { id: 'c1', n: 'aix-erp-01', lid: 21 },
      { id: 'c2', n: 'aix-erp-02', lid: 22 },
    ];
    const cy = rows(cDefs.length, 200);
    cDefs.forEach((c, i) => {
      nodes.push(box(c.id, `<b>${c.n}</b>\nLPAR ID ${c.lid}`, 'client', COL.right, cy[i],
        `Client LPAR: ${c.n}\nLPAR ID: ${c.lid}\nBoot: SAN (NPIV)`));
    });
    return { nodes, edges };
  }

  /* ============================================================
     TAB 2 — vSCSI Topology
     Flow:  VIOS  →  vhostX + backing storage (LV / SSP LU / hdisk)  →  Client LPAR
     Edges: client slot + target disk runtime indicators
  ============================================================ */
  function vscsiData_A() {
    const nodes = [], edges = [];
    const vy = rows(2, 220);
    nodes.push(box('v1', '<b>VIOS1</b>\nID 1 · vios1a', 'vios', COL.left, vy[0], 'Partition: vios1a\nLPAR ID: 1\nState: Running'));
    nodes.push(box('v2', '<b>VIOS2</b>\nID 2 · vios2a', 'vios', COL.left, vy[1], 'Partition: vios2a\nLPAR ID: 2\nState: Running'));

    // Middle: vhost + backing device abstraction
    const midDefs = [
      { id: 'm1', v: 'v1', vhost: 'vhost0', back: 'LV lv_prod_db',  vtd: 'vtscsi0', type: 'Logical Volume',       c: 'c1', slot: 'C10', run: 'Available' },
      { id: 'm2', v: 'v2', vhost: 'vhost0', back: 'LU lu_db_01',    vtd: 'vtscsi0', type: 'SSP Logical Unit',     c: 'c1', slot: 'C11', run: 'Available' },
      { id: 'm3', v: 'v1', vhost: 'vhost1', back: 'hdisk4',         vtd: 'vtscsi1', type: 'Physical Volume',      c: 'c2', slot: 'C10', run: 'Available' },
      { id: 'm4', v: 'v2', vhost: 'vhost1', back: 'LU lu_app_02',   vtd: 'vtscsi1', type: 'SSP Logical Unit',     c: 'c2', slot: 'C11', run: 'Available' },
      { id: 'm5', v: 'v1', vhost: 'vhost2', back: 'hdisk7 (rootvg)',vtd: 'vtopt0',  type: 'Physical Volume',      c: 'c3', slot: 'C12', run: 'Defined'   },
    ];
    const my = rows(midDefs.length, 118);
    midDefs.forEach((m, i) => {
      nodes.push(box(m.id, `<b>${m.vhost}</b>\n${m.vtd} → ${m.back}\n<i>${m.type}</i>`, 'mid', COL.mid, my[i],
        `Server SCSI adapter: ${m.vhost}\nVirtual target device: ${m.vtd}\nBacking: ${m.back}\nType: ${m.type}\nStatus: ${m.run}`));
      edges.push(edge(m.v, m.id, '', `${m.vhost} on VIOS`));
      edges.push(edge(m.id, m.c, `Slot ${m.slot} · ${m.run}`,
        `Client vSCSI slot: ${m.slot}\nTarget device: ${m.vtd}\nRuntime: ${m.run}`));
    });

    const cDefs = [
      { id: 'c1', n: 'aix-db-prod',  lid: 11 },
      { id: 'c2', n: 'aix-app-prod', lid: 12 },
      { id: 'c3', n: 'aix-nim-01',   lid: 14 },
    ];
    const cy = rows(cDefs.length, 170);
    cDefs.forEach((c, i) => {
      nodes.push(box(c.id, `<b>${c.n}</b>\nLPAR ID ${c.lid}`, 'client', COL.right, cy[i],
        `Client LPAR: ${c.n}\nLPAR ID: ${c.lid}\nBoot: vSCSI`));
    });
    return { nodes, edges };
  }

  function vscsiData_B() {
    const nodes = [], edges = [];
    const vy = rows(1, 100);
    nodes.push(box('v1', '<b>VIOS1</b>\nID 1 · vio1', 'vios', COL.left, 0, 'Partition: vio1\nLPAR ID: 1\nState: Running'));

    const midDefs = [
      { id: 'm1', v: 'v1', vhost: 'vhost0', back: 'LV rootvg_erp1', vtd: 'vtscsi0', type: 'Logical Volume',  c: 'c1', slot: 'C10', run: 'Available' },
      { id: 'm2', v: 'v1', vhost: 'vhost1', back: 'hdisk9',         vtd: 'vtscsi1', type: 'Physical Volume', c: 'c2', slot: 'C10', run: 'Available' },
    ];
    const my = rows(midDefs.length, 150);
    midDefs.forEach((m, i) => {
      nodes.push(box(m.id, `<b>${m.vhost}</b>\n${m.vtd} → ${m.back}\n<i>${m.type}</i>`, 'mid', COL.mid, my[i],
        `Server SCSI adapter: ${m.vhost}\nBacking: ${m.back}\nType: ${m.type}\nStatus: ${m.run}`));
      edges.push(edge(m.v, m.id, ''));
      edges.push(edge(m.id, m.c, `Slot ${m.slot} · ${m.run}`,
        `Client vSCSI slot: ${m.slot}\nRuntime: ${m.run}`));
    });

    const cDefs = [
      { id: 'c1', n: 'aix-erp-01', lid: 21 },
      { id: 'c2', n: 'aix-erp-02', lid: 22 },
    ];
    const cy = rows(cDefs.length, 150);
    cDefs.forEach((c, i) => {
      nodes.push(box(c.id, `<b>${c.n}</b>\nLPAR ID ${c.lid}`, 'client', COL.right, cy[i],
        `Client LPAR: ${c.n}\nLPAR ID: ${c.lid}\nBoot: vSCSI`));
    });
    return { nodes, edges };
  }

  /* ============================================================
     TAB 3 — Virtual Network (SEA / SR-IOV)
     Flow:  Client LPAR  →  Virtual Ethernet (VLAN + vSwitch)  →  VIOS/SEA  →  Physical Trunk
     4 columns; uses custom x offsets.
  ============================================================ */
  const NCOL = { client: -600, vlan: -180, vios: 240, phys: 620 };

  function vnetData_A() {
    const nodes = [], edges = [];

    // Left: client LPARs
    const cDefs = [
      { id: 'c1', n: 'aix-db-prod',  lid: 11, vlan: 100 },
      { id: 'c2', n: 'aix-app-prod', lid: 12, vlan: 100 },
      { id: 'c3', n: 'linux-web01',  lid: 13, vlan: 200 },
      { id: 'c4', n: 'aix-nim-01',   lid: 14, vlan: 200 },
    ];
    const cy = rows(cDefs.length, 130);
    cDefs.forEach((c, i) => {
      c._y = cy[i];
      nodes.push(box(c.id, `<b>${c.n}</b>\nLPAR ID ${c.lid} · ent0`, 'client', NCOL.client, cy[i],
        `Client LPAR: ${c.n}\nLPAR ID: ${c.lid}\nVirtual adapter: ent0\nPVID: ${c.vlan}`));
    });

    // Middle: virtual ethernet / VLAN + vSwitch
    const vlanDefs = [
      { id: 'g1', vlan: 100, sw: 'DefaultSwitch', sea: 's1' },
      { id: 'g2', vlan: 200, sw: 'DefaultSwitch', sea: 's1' },
    ];
    const gy = rows(vlanDefs.length, 260);
    vlanDefs.forEach((g, i) => {
      g._y = gy[i];
      nodes.push(box(g.id, `<b>VLAN ${g.vlan}</b>\nvSwitch: ${g.sw}`, 'vlan', NCOL.vlan, gy[i],
        `VLAN ID: ${g.vlan}\nVirtual Switch: ${g.sw}\nMode: VEB (bridged)`));
    });
    // client → vlan edges
    cDefs.forEach(c => {
      const g = vlanDefs.find(v => v.vlan === c.vlan);
      edges.push(edge(c.id, g.id, `PVID ${c.vlan}`,
        `Client ${c.n}\nVirtual adapter ent0\nPVID: ${c.vlan}\nvSwitch: ${g.sw}`));
    });

    // Right: VIOS with SEA
    const seaDefs = [
      { id: 's1', vios: 'vios1a', sea: 'ent4', trunk: 'ent3 (trunk)', phys: 'p1' },
    ];
    seaDefs.forEach(s => {
      nodes.push(box(s.id, `<b>${s.vios}</b>\nSEA ${s.sea}\n<i>${s.trunk}</i>`, 'vios', NCOL.vios, 0,
        `VIO Server: ${s.vios}\nShared Ethernet Adapter: ${s.sea}\nVirtual trunk: ${s.trunk}\nHA mode: Sharing`));
    });
    vlanDefs.forEach(g => {
      edges.push(edge(g.id, g.sea, `bridge`, `VLAN ${g.vlan} bridged via SEA`));
    });

    // Far right: physical EtherChannel / trunk
    nodes.push(box('p1', '<b>EtherChannel</b>\nent0 + ent1\n<i>Link Aggregation</i>', 'phys', NCOL.phys, 0,
      'Physical adapter: ent0 + ent1\nMode: 802.3ad (LACP)\nSpeed: 2x25 Gbps\nUplink: core-switch-a/b'));
    edges.push(edge('s1', 'p1', 'ent4 → phys', 'SEA backed by physical EtherChannel'));

    return { nodes, edges };
  }

  function vnetData_B() {
    const nodes = [], edges = [];

    const cDefs = [
      { id: 'c1', n: 'aix-erp-01', lid: 21, vlan: 300 },
      { id: 'c2', n: 'aix-erp-02', lid: 22, vlan: 300 },
      { id: 'c3', n: 'aix-mgmt-01',lid: 23, vlan: 999 },
    ];
    const cy = rows(cDefs.length, 150);
    cDefs.forEach((c, i) => {
      nodes.push(box(c.id, `<b>${c.n}</b>\nLPAR ID ${c.lid} · ent0`, 'client', NCOL.client, cy[i],
        `Client LPAR: ${c.n}\nLPAR ID: ${c.lid}\nVirtual adapter: ent0\nPVID: ${c.vlan}`));
    });

    const vlanDefs = [
      { id: 'g1', vlan: 300, sw: 'DefaultSwitch', sea: 's1' },
      { id: 'g2', vlan: 999, sw: 'MgmtSwitch',    sea: 's1' },
    ];
    const gy = rows(vlanDefs.length, 220);
    vlanDefs.forEach((g, i) => {
      nodes.push(box(g.id, `<b>VLAN ${g.vlan}</b>\nvSwitch: ${g.sw}`, 'vlan', NCOL.vlan, gy[i],
        `VLAN ID: ${g.vlan}\nVirtual Switch: ${g.sw}`));
    });
    cDefs.forEach(c => {
      const g = vlanDefs.find(v => v.vlan === c.vlan);
      edges.push(edge(c.id, g.id, `PVID ${c.vlan}`, `Client ${c.n}\nPVID: ${c.vlan}`));
    });

    nodes.push(box('s1', `<b>vio1</b>\nSEA ent5\n<i>ent2 (trunk)</i>`, 'vios', NCOL.vios, 0,
      'VIO Server: vio1\nShared Ethernet Adapter: ent5\nVirtual trunk: ent2\nHA mode: Auto'));
    vlanDefs.forEach(g => edges.push(edge(g.id, g.sea, 'bridge', `VLAN ${g.vlan} bridged via SEA`)));

    nodes.push(box('p1', '<b>Physical</b>\nent0\n<i>Single link</i>', 'phys', NCOL.phys, 0,
      'Physical adapter: ent0\nSpeed: 10 Gbps\nUplink: tor-switch-1'));
    edges.push(edge('s1', 'p1', 'ent5 → phys', 'SEA backed by physical adapter'));

    return { nodes, edges };
  }

  /* ============================================================
     VIS.JS RENDERING ENGINE
  ============================================================ */
  const VIS_OPTIONS = {
    physics: false,                       // pre-calculated coordinates → static layout
    interaction: {
      hover: true,
      tooltipDelay: 120,
      dragNodes: true,
      dragView: true,
      zoomView: true,
      navigationButtons: false,
    },
    nodes: { shadow: { enabled: true, size: 6, x: 0, y: 2, color: 'rgba(15,23,42,0.12)' } },
    edges: { selectionWidth: 2 },
  };

  const FLOW_LABELS = {
    npiv:  'VIOS  →  Virtual FC Mapping  →  Client LPAR',
    vscsi: 'VIOS  →  Virtual SCSI Target  →  Client LPAR',
    vnet:  'Client LPAR  →  vSwitch / VLAN  →  VIOS (SEA)  →  Physical Network',
  };

  const LEGENDS = {
    npiv:  [['vios','VIOS'], ['mid','vFC Mapping'], ['client','Client LPAR']],
    vscsi: [['vios','VIOS'], ['mid','vSCSI Target'], ['client','Client LPAR']],
    vnet:  [['client','Client LPAR'], ['vlan','VLAN / vSwitch'], ['vios','VIOS (SEA)'], ['phys','Physical']],
  };

  // Runtime registry of built vis.js networks, keyed by tab
  const NET = { npiv: null, vscsi: null, vnet: null };
  let currentTab = 'npiv';

  function currentMS() { return document.getElementById('ms-selector').value; }

  // Build (or rebuild) a network for the given tab from mock data
  function buildNetwork(tab) {
    const src = DATA[currentMS()][tab];
    const container = document.getElementById('net-' + tab);

    // deep-clone so per-instance highlight state never mutates the source data
    const nodes = new vis.DataSet(src.nodes.map(n => Object.assign({}, n)));
    const edges = new vis.DataSet(src.edges.map((e, i) => Object.assign({ id: 'e' + tab + i }, e)));

    if (NET[tab] && NET[tab].network) { NET[tab].network.destroy(); }
    const network = new vis.Network(container, { nodes, edges }, VIS_OPTIONS);


    // ---------- Dimming / isolation on click ----------
    network.on('selectNode', params => isolate(tab, params.nodes[0]));
    network.on('deselectNode', () => resetHighlight(tab));
    network.on('click', params => {
      if (params.nodes.length === 0) resetHighlight(tab);
    });

    NET[tab] = { network, nodes, edges };
    // fit after the container has real dimensions
    requestAnimationFrame(() => network.fit({ animation: false }));
    return NET[tab];
  }

  // Trace the connected component reachable from a node (both directions)
  function connectedSet(tab, startId) {
    const { edges } = NET[tab];
    const adj = {};
    edges.get().forEach(e => {
      (adj[e.from] = adj[e.from] || []).push(e.to);
      (adj[e.to] = adj[e.to] || []).push(e.from);
    });
    const seen = new Set([startId]);
    const stack = [startId];
    while (stack.length) {
      const cur = stack.pop();
      (adj[cur] || []).forEach(nb => { if (!seen.has(nb)) { seen.add(nb); stack.push(nb); } });
    }
    return seen;
  }

  function isolate(tab, startId) {
    const { nodes, edges } = NET[tab];
    const keep = connectedSet(tab, startId);

    nodes.update(nodes.get().map(n => {
      const active = keep.has(n.id);
      const c = C[n._kind];
      return {
        id: n.id,
        opacity: active ? 1 : 0.18,
        color: {
          background: active ? c.bg : '#f8fafc',
          border: active ? c.border : '#e2e8f0',
        },
        font: { color: active ? c.font : '#cbd5e1' },
      };
    }));

    edges.update(edges.get().map(e => {
      const active = keep.has(e.from) && keep.has(e.to);
      return {
        id: e.id,
        color: { color: active ? '#0f172a' : '#e2e8f0', opacity: active ? 1 : 0.25 },
        width: active ? 2.5 : 1,
        font: { color: active ? '#0f172a' : '#e2e8f0', strokeColor: '#ffffff', strokeWidth: 4 },
      };
    }));

    const label = nodes.get(startId).label.replace(/<[^>]+>/g, '').split('\n')[0];
    setStatus(`Isolated path for “${label}” — ${keep.size} connected node(s) highlighted.`);
  }

  function resetHighlight(tab) {
    const { nodes, edges } = NET[tab];
    nodes.update(nodes.get().map(n => {
      const c = C[n._kind];
      return {
        id: n.id, opacity: 1,
        color: { background: c.bg, border: c.border },
        font: { color: c.font },
      };
    }));
    edges.update(edges.get().map(e => ({
      id: e.id,
      color: { color: '#94a3b8', opacity: 1 },
      width: 1.5,
      font: { color: '#475569', strokeColor: '#ffffff', strokeWidth: 4 },
    })));
    setStatus('Click any node to isolate its virtualization path. Click empty space to reset.');
  }

  function setStatus(msg) { document.getElementById('status-bar').textContent = msg; }

  /* ============================================================
     TAB SWITCHING (handles canvas redraw so it never collapses)
  ============================================================ */
  function showTab(tab) {
    currentTab = tab;

    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-pane').forEach(p =>
      p.classList.toggle('active', p.id === 'pane-' + tab));

    document.getElementById('flow-label').innerHTML =
      '<i data-lucide="git-branch" class="w-4 h-4"></i><span>' + FLOW_LABELS[tab] + '</span>';
    renderLegend(tab);
    lucide.createIcons();

    // (Re)build the network now that its pane is visible with real dimensions
    buildNetwork(tab);
  }

  function renderLegend(tab) {
    const el = document.getElementById('legend');
    el.innerHTML = LEGENDS[tab].map(([kind, name]) =>
      `<span class="flex items-center gap-1.5">
         <span class="legend-swatch" style="background:${C[kind].bg};border:2px solid ${C[kind].border}"></span>${name}
       </span>`).join('');
  }

  /* ============================================================
     BOOTSTRAP
  ============================================================ */
  document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();

    document.querySelectorAll('.tab-btn').forEach(btn =>
      btn.addEventListener('click', () => showTab(btn.dataset.tab)));

    document.getElementById('ms-selector').addEventListener('change', () => {
      // rebuild every already-built network for the new managed system
      Object.keys(NET).forEach(t => { if (NET[t]) NET[t].network.destroy(); NET[t] = null; });
      buildNetwork(currentTab);
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      resetHighlight(currentTab);
      NET[currentTab].network.fit({ animation: { duration: 400 } });
    });

    // keep canvas sized to its container
    window.addEventListener('resize', () => {
      if (NET[currentTab]) {
        NET[currentTab].network.redraw();
        NET[currentTab].network.fit({ animation: false });
      }
    });

    showTab('npiv');
  });
  </script>
</body>
</html>
